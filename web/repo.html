<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
            rel="shortcut icon"
            href="assets/logos/gitgost-logo.svg"
            type="image/svg+xml"
        />
    <link rel="icon" href="assets/logos/gitgost-logo.svg" type="image/svg+xml" />
    <title>gitGost — repo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link id="hljs-theme-light" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github.min.css" />
    <link id="hljs-theme-dark" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github-dark.min.css" disabled />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <script>if (typeof hljs !== 'undefined') hljs.configure({ ignoreUnescapedHTML: true });</script>
    <script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #1a1f2e;
            --fg-muted: #6b7280;
            --fg-secondary: #9ca3af;
            --bg-secondary: #f5f5f5;
            --bg-hover: #ebebeb;
            --accent: #d16014;
            --border: #e0e0e0;
            --card: #f9f9f9;
            --code-bg: #f4f4f4;
        }
        :root[data-theme="dark"] {
            --bg: #000000;
            --fg: #d4d4d4;
            --fg-muted: #9ca3af;
            --fg-secondary: #6b7280;
            --bg-secondary: #0d0d0d;
            --bg-hover: #1a1a1a;
            --accent: #ffa657;
            --border: #222222;
            --card: #0d0d0d;
            --code-bg: #111111;
        }
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme]) {
                --bg: #000000; --fg: #d4d4d4; --fg-muted: #9ca3af;
                --fg-secondary: #6b7280; --bg-secondary: #0d0d0d;
                --bg-hover: #1a1a1a; --accent: #ffa657;
                --border: #222222; --card: #0d0d0d; --code-bg: #111111;
            }
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: "IBM Plex Sans", system-ui, sans-serif;
            font-size: 0.9rem;
            min-height: 100vh;
        }

        /* Top bar */
        .topbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 1.25rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .topbar-logo {
            font-family: "IBM Plex Mono", monospace;
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--accent);
            text-decoration: none;
        }
        .topbar-title {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.88rem;
            color: var(--fg);
            flex: 1;
        }
        .topbar-title .owner { color: var(--accent); }
        .topbar-title .sep { color: var(--fg-muted); }
        .topbar-actions { display: flex; gap: 0.4rem; }
        .rv-btn {
            padding: 0.28rem 0.7rem;
            border: 1px solid var(--border);
            border-radius: 3px;
            background: transparent;
            color: var(--fg);
            font-size: 0.75rem;
            cursor: pointer;
            font-family: "IBM Plex Mono", monospace;
            transition: all 0.15s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        .rv-btn:hover { border-color: var(--fg-secondary); }
        .rv-btn.star { color: var(--accent); border-color: var(--accent); }
        .rv-btn.star:disabled { opacity: 0.4; cursor: not-allowed; }
        .rv-btn.back { color: var(--fg-muted); }

        /* Breadcrumb */
        .breadcrumb {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.75rem;
            color: var(--fg-muted);
            padding: 0.4rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex-wrap: wrap;
            background: var(--bg-secondary);
        }
        .breadcrumb span.crumb { cursor: pointer; color: var(--accent); }
        .breadcrumb span.crumb:hover { text-decoration: underline; }
        .breadcrumb span.sep { color: var(--fg-secondary); }
        .breadcrumb span.current { color: var(--fg); }

        /* Layout */
        .repo-layout {
            display: flex;
            height: calc(100vh - 80px);
        }

        /* File tree */
        .file-tree {
            width: 200px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            overflow-x: hidden;
            flex-shrink: 0;
            background: var(--bg);
            padding: 0.4rem 0;
        }
        .tree-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.5rem;
            font-size: 0.78rem;
            font-family: "IBM Plex Mono", monospace;
            cursor: pointer;
            color: var(--fg);
            white-space: nowrap;
            transition: background 0.1s;
            line-height: 1.4;
            user-select: none;
            border-radius: 4px;
            margin: 0 0.25rem;
        }
        .tree-item:hover { background: var(--bg-hover); }
        .tree-item.active { background: var(--bg-hover); }
        .tree-item.active .tree-name { color: var(--accent); }
        .tree-chevron {
            flex-shrink: 0;
            color: var(--fg-secondary);
            width: 12px;
            transition: transform 0.15s;
            display: flex;
            align-items: center;
        }
        .tree-chevron.open { transform: rotate(90deg); }
        .tree-chevron.hidden { visibility: hidden; }
        .tree-icon {
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }
        .tree-icon.dir  { color: #e8a44a; }
        .tree-icon.file { color: var(--fg-secondary); }
        .tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
        .tree-name.dir  { color: var(--fg); font-weight: 500; }
        .tree-name.file { color: var(--fg); }
        .tree-children { display: none; }
        .tree-children.open { display: block; }
        .tree-loading { padding: 1rem; font-size: 0.78rem; color: var(--fg-secondary); font-family: "IBM Plex Mono", monospace; }
        .tree-badge {
            font-size: 0.65rem;
            color: var(--fg-secondary);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0 0.35em;
            margin-left: 0.4rem;
            flex-shrink: 0;
            line-height: 1.6;
        }

        /* Code panel */
        .code-panel {
            flex: 1;
            overflow: auto;
            background: var(--bg);
        }
        .code-panel pre {
            margin: 0;
            padding: 1.25rem 1.5rem;
            font-size: 0.78rem;
            font-family: "IBM Plex Mono", monospace;
            line-height: 1.65;
            color: var(--fg);
            white-space: pre-wrap;
            word-break: break-all;
        }
        .code-loading {
            padding: 2rem;
            font-size: 0.78rem;
            color: var(--fg-secondary);
            font-family: "IBM Plex Mono", monospace;
        }
        .readme {
            padding: 1.5rem 2rem;
            font-size: 0.9rem;
            line-height: 1.75;
            color: var(--fg);
            max-width: 860px;
        }
        .readme h1, .readme h2, .readme h3, .readme h4, .readme h5, .readme h6 {
            margin: 1.5rem 0 0.75rem;
            color: var(--fg);
            font-weight: 600;
            line-height: 1.25;
        }
        .readme h1 { font-size: 1.6rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
        .readme h2 { font-size: 1.3rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--border); }
        .readme h3 { font-size: 1.1rem; }
        .readme h4 { font-size: 0.95rem; }
        .readme p { margin: 0.75rem 0; }
        .readme code {
            background: var(--code-bg);
            padding: 0.2em 0.45em;
            border-radius: 4px;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.83em;
            border: 1px solid var(--border);
        }
        .readme pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem 1.25rem;
            overflow-x: auto;
            overflow-y: hidden;
            margin: 1rem 0;
            white-space: pre;
        }
        .readme pre code { background: none; padding: 0; border: none; font-size: 0.82rem; }
        .readme a { color: var(--accent); text-decoration: none; }
        .readme a:hover { text-decoration: underline; }
        .readme blockquote {
            border-left: 4px solid var(--border);
            margin: 0.75rem 0;
            padding: 0.5rem 1rem;
            color: var(--fg-muted);
            background: var(--bg-secondary);
            border-radius: 0 4px 4px 0;
        }
        .readme blockquote p { margin: 0; }
        .readme ul, .readme ol { padding-left: 2rem; margin: 0.5rem 0; }
        .readme li { margin: 0.3rem 0; }
        .readme img { max-width: 100%; border-radius: 4px; }
        .readme table {
            border-collapse: collapse;
            width: 100%;
            margin: 1rem 0;
            font-size: 0.85rem;
        }
        .readme th, .readme td {
            border: 1px solid var(--border);
            padding: 0.5rem 0.85rem;
            text-align: left;
        }
        .readme th { background: var(--bg-secondary); font-weight: 600; }
        .readme tr:nth-child(even) { background: var(--bg-secondary); }
        .readme hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
        .readme input[type="checkbox"] { margin-right: 0.4rem; }

        /* Repo info bar */
        .repo-info {
            padding: 0.5rem 1.25rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--fg-secondary);
            display: flex;
            gap: 1.5rem;
            background: var(--bg-secondary);
        }
        .repo-info span { display: flex; align-items: center; gap: 0.3rem; }
        .repo-info .stars { color: var(--accent); }

        /* Left nav */
        .left-nav {
            width: 300px;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--bg);
            padding: 0.5rem 0;
        }
        .left-nav a {
            display: block;
            padding: 0.35rem 1rem;
            font-size: 0.78rem;
            font-family: "IBM Plex Mono", monospace;
            color: var(--fg-muted);
            text-decoration: none;
            border-left: 2px solid transparent;
            transition: background 0.1s, color 0.1s;
        }
        .left-nav a:hover { background: var(--bg-hover); color: var(--fg); }
        .left-nav a.active { border-left-color: var(--accent); color: var(--fg); background: var(--bg-hover); }

        /* Right sidebar */
        .right-sidebar {
            width: 300px;
            border-left: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--bg);
            padding: 1rem;
            overflow-y: auto;
            font-size: 0.78rem;
        }
        .sidebar-section {
            margin-bottom: 1.25rem;
        }
        .sidebar-label {
            font-size: 0.68rem;
            font-family: "IBM Plex Mono", monospace;
            color: var(--fg-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.4rem;
        }
        .sidebar-desc {
            font-size: 0.78rem;
            color: var(--fg-muted);
            line-height: 1.55;
        }
        .sidebar-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.2rem 0;
            font-size: 0.75rem;
            color: var(--fg-muted);
        }
        .sidebar-row .val {
            color: var(--fg);
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.72rem;
        }
        .sidebar-row .val.pub { color: #22c55e; }
        .sidebar-row .val.mirror { color: var(--fg-muted); }
        .sidebar-actions {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            margin-top: 0.25rem;
        }
        .sidebar-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.6rem;
            border: 1px solid var(--border);
            border-radius: 3px;
            background: transparent;
            color: var(--fg);
            font-size: 0.74rem;
            font-family: "IBM Plex Mono", monospace;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.1s, border-color 0.1s;
            width: 100%;
            box-sizing: border-box;
        }
        .sidebar-btn:hover { background: var(--bg-hover); border-color: var(--fg-secondary); }
        .sidebar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .sidebar-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-top: 0.4rem;
        }
        .sidebar-tag {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.68rem;
            color: var(--accent);
            text-decoration: none;
            border: 1px solid var(--accent);
            border-radius: 3px;
            padding: 0.1em 0.45em;
            opacity: 0.8;
        }

        /* Languages bar */
        .lang-bar {
            display: flex;
            height: 6px;
            border-radius: 4px;
            overflow: hidden;
            gap: 2px;
            margin: 0.5rem 0 0.6rem;
        }
        .lang-bar-seg {
            height: 100%;
            border-radius: 2px;
        }
        .lang-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 0.75rem;
        }
        .lang-legend-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.68rem;
            color: var(--fg-muted);
        }
        .lang-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .lang-name { color: var(--fg); font-weight: 500; }

        /* Issues / PRs list */
        .issue-list { display: flex; flex-direction: column; padding: 1rem 1.25rem; }
        .issue-item {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            padding: 0.45rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.82rem;
            text-decoration: none;
            color: var(--fg);
        }
        .issue-item:last-child { border-bottom: none; }
        .issue-item:hover .issue-title { color: var(--accent); }
        .issue-num {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.72rem;
            color: var(--fg-secondary);
            flex-shrink: 0;
            min-width: 3rem;
        }
        .issue-title { flex: 1; line-height: 1.4; }
        .issue-meta {
            font-size: 0.72rem;
            color: var(--fg-secondary);
            flex-shrink: 0;
            font-family: "IBM Plex Mono", monospace;
        }
        .issue-label {
            display: inline-block;
            font-size: 0.65rem;
            font-family: "IBM Plex Mono", monospace;
            padding: 0.1em 0.4em;
            border-radius: 2px;
            margin-left: 0.3rem;
            vertical-align: middle;
        }
        .issue-list-header {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.72rem;
            color: var(--fg-secondary);
            padding: 0.75rem 1.25rem 0.4rem;
            border-bottom: 1px solid var(--border);
        }
        .issue-list-header span { color: var(--fg); font-weight: 600; }

        /* Bugs toolbar */
        .bugs-toolbar {
            display: flex;
            align-items: center;
            padding: 0.6rem 1.25rem;
            border-bottom: 1px solid var(--border);
            gap: 1.25rem;
        }
        .bugs-tab {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.75rem;
            color: var(--fg-muted);
            cursor: pointer;
            padding-bottom: 2px;
            border-bottom: 2px solid transparent;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .bugs-tab.active { color: var(--fg); border-bottom-color: var(--accent); }
        .bugs-tab:hover:not(.active) { color: var(--fg); }
        .bugs-spacer { flex: 1; }
        .bugs-new-btn {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.72rem;
            color: var(--accent);
            background: none;
            border: 1px solid var(--accent);
            border-radius: 3px;
            padding: 0.25rem 0.6rem;
            cursor: pointer;
            opacity: 0.85;
        }
        .bugs-new-btn:hover { opacity: 1; }
        .bugs-empty {
            padding: 3rem 1.25rem;
            text-align: center;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.78rem;
            color: var(--fg-muted);
        }

        /* Bug modal */
        .bug-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bug-modal {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 480px;
            max-width: 95vw;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }
        .bug-modal-title {
            font-size: 0.78rem;
            font-family: "IBM Plex Mono", monospace;
            color: var(--fg-muted);
            margin-bottom: 0.1rem;
        }
        .bug-modal input, .bug-modal textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 0.35rem 0;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.82rem;
            color: var(--fg);
            outline: none;
            resize: none;
            box-sizing: border-box;
        }
        .bug-modal textarea { min-height: 120px; }
        .bug-modal-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }
        .bug-modal-footer .note {
            font-size: 0.7rem;
            color: var(--fg-muted);
            font-family: "IBM Plex Mono", monospace;
        }
        .bug-modal-footer .note a { color: var(--accent); }
        .bug-modal-actions { display: flex; gap: 0.5rem; }
        .bug-cancel-btn {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.75rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            color: var(--fg-muted);
        }
        .bug-submit-btn {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.75rem;
            background: var(--accent);
            border: none;
            border-radius: 3px;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            color: #fff;
        }
        .bug-submit-btn:disabled { opacity: 0.5; cursor: default; }

        /* Issue detail panel */
        .issue-detail {
            display: flex;
            height: 100%;
            overflow: hidden;
        }
        .issue-detail-main {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
            min-width: 0;
        }
        .issue-detail-header {
            display: flex;
            align-items: baseline;
            gap: 0.6rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .issue-detail-num {
            font-family: "IBM Plex Mono", monospace;
            font-size: 1rem;
            color: var(--fg-muted);
        }
        .issue-detail-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--fg);
            flex: 1;
        }
        .issue-detail-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--fg-muted);
            font-family: "IBM Plex Mono", monospace;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        .issue-detail-avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--bg-secondary);
            flex-shrink: 0;
        }
        .issue-detail-body {
            font-size: 0.88rem;
            line-height: 1.7;
            color: var(--fg);
        }
        .issue-detail-body code {
            background: var(--code-bg);
            padding: 0.15em 0.4em;
            border-radius: 3px;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.83em;
            border: 1px solid var(--border);
        }
        .issue-detail-body pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 0.85rem 1rem;
            overflow: auto;
        }
        .issue-detail-body pre code { background:none; border:none; padding:0; }
        .issue-detail-body ol, .issue-detail-body ul { padding-left: 1.5rem; }
        .issue-detail-sidebar {
            width: 200px;
            flex-shrink: 0;
            border-left: 1px solid var(--border);
            padding: 1.25rem 1rem;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.72rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            overflow-y: auto;
        }
        .issue-detail-sidebar .ds-label {
            color: var(--fg-muted);
            margin-bottom: 0.15rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .issue-detail-sidebar .ds-val {
            color: var(--fg);
        }
        .issue-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.72rem;
            color: var(--fg-muted);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            margin-bottom: 1rem;
        }
        .issue-back-btn:hover { color: var(--accent); }
        .issue-ext-link {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.68rem;
            color: var(--accent);
            text-decoration: none;
        }
        .issue-ext-link:hover { text-decoration: underline; }

        /* Reply box */
        .reply-section {
            margin-top: 1.5rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }
        .reply-row {
            display: flex;
            gap: 0.6rem;
            align-items: flex-start;
        }
        .reply-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }
        .reply-box {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--bg);
            padding: 0.55rem 0.7rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .reply-textarea {
            width: 100%;
            min-height: 56px;
            background: none;
            border: none;
            outline: none;
            resize: vertical;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.78rem;
            color: var(--fg);
            line-height: 1.5;
        }
        .reply-textarea::placeholder { color: var(--fg-muted); }
        .reply-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.5rem;
        }
        .reply-token {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.68rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 0.2rem 0.5rem;
            color: var(--fg-muted);
            width: 140px;
        }
        .reply-token::placeholder { color: var(--fg-muted); opacity: 0.6; }
        .reply-send-btn {
            background: var(--accent);
            border: none;
            border-radius: 4px;
            padding: 0.3rem 0.55rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            flex-shrink: 0;
        }
        .reply-send-btn:disabled { opacity: 0.5; cursor: default; }
        .reply-status {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.65rem;
            color: var(--fg-muted);
        }

        /* Inline comments */
        .comment-list {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .comment-item {
            display: flex;
            gap: 0.6rem;
            align-items: flex-start;
        }
        .comment-bubble {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 0.5rem 0.75rem;
            font-size: 0.8rem;
            line-height: 1.5;
            color: var(--fg);
        }
        .comment-meta {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.63rem;
            color: var(--fg-muted);
            margin-bottom: 0.25rem;
        }

        /* Hash save modal */
        .hash-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hash-modal {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            max-width: 340px;
            width: 90%;
            font-family: "IBM Plex Mono", monospace;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
        .hash-modal-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--fg);
            margin-bottom: 0.5rem;
        }
        .hash-modal-body {
            font-size: 0.72rem;
            color: var(--fg-muted);
            line-height: 1.5;
            margin-bottom: 1rem;
        }
        .hash-modal-code {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.4rem 0.6rem;
            font-size: 0.75rem;
            color: var(--accent);
            word-break: break-all;
            margin-bottom: 1rem;
        }
        .hash-modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }
        .hash-modal-btn {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.72rem;
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            border: 1px solid var(--border);
            cursor: pointer;
            background: none;
            color: var(--fg);
        }
        .hash-modal-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .hash-modal-btn:hover { opacity: 0.85; }

        /* Clone modal */
        .clone-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .clone-modal {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            width: 420px;
            max-width: 95vw;
            font-family: 'IBM Plex Mono', monospace;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
        .clone-modal-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--fg);
            margin-bottom: 1rem;
        }
        .clone-option {
            margin-bottom: 0.75rem;
        }
        .clone-option-label {
            font-size: 0.7rem;
            color: var(--fg-muted);
            margin-bottom: 0.25rem;
        }
        .clone-option-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .clone-option-code {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.35rem 0.6rem;
            font-size: 0.72rem;
            color: var(--fg);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .clone-copy-btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.68rem;
            padding: 0.3rem 0.55rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: none;
            color: var(--fg-muted);
            cursor: pointer;
            flex-shrink: 0;
        }
        .clone-copy-btn:hover { background: var(--bg-hover); }
        .clone-modal-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }
        .clone-close-btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            padding: 0.35rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: none;
            color: var(--fg);
            cursor: pointer;
        }
        .clone-close-btn:hover { opacity: 0.75; }

        /* Status Bar (Top Navigation) */
        .statusbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
        }
        .statusbar-left { display: flex; align-items: center; gap: 0.5rem; }
        .statusbar-right { display: flex; align-items: center; gap: 0.5rem; }
        .statusbar a { color: var(--accent); text-decoration: none; }
        .statusbar a:hover { text-decoration: underline; }

        /* Suspension Banner */
        .suspension-banner {
            display: none;
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 4px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.78rem;
            color: #856404;
            align-items: center;
            gap: 0.75rem;
        }

        :root[data-theme="dark"] .suspension-banner {
            background: #663d03;
            border-color: #ffa657;
            color: #ffe6a7;
        }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme]) .suspension-banner {
                background: #663d03;
                border-color: #ffa657;
                color: #ffe6a7;
            }
        }

        .suspension-banner.active {
            display: flex;
        }

        .suspension-banner-icon {
            flex-shrink: 0;
            font-size: 1.2rem;
        }

        .suspension-banner-content {
            flex: 1;
        }

        .suspension-banner-content strong {
            font-weight: 600;
            display: block;
            margin-bottom: 0.25rem;
        }
    </style>
</head>

    <script>
        const API_BASE = window.location.origin;

        // Suspension banner functions
        async function checkServiceStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/status`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.panic_mode) {
                        showSuspensionBanner();
                    }
                }
            } catch (error) {
                console.error('Failed to check service status:', error);
            }
        }

        function showSuspensionBanner() {
            const banner = document.getElementById('suspension-banner');
            if (banner) {
                banner.classList.add('active');
            }
        }

        // Check service status on page load
        checkServiceStatus();

        // GitHub fetch helper — usa token de localStorage si existe para evitar rate limiting
        function ghFetch(url, opts = {}) {
            const token = localStorage.getItem('gh_token');
            if (token) {
                opts.headers = { ...(opts.headers || {}), 'Authorization': `token ${token}` };
            }
            return fetch(url, opts).then(res => {
                if (res.status === 403 || res.status === 429) {
                    return res.json().catch(() => ({})).then(body => {
                        const msg = body.message || `rate limit exceeded (${res.status})`;
                        throw new Error(msg + ' — set a GitHub token in settings to fix this');
                    });
                }
                return res;
            });
        }

        // Parse URL params: /repo.html?owner=X&repo=Y&provider=gh
        const params = new URLSearchParams(window.location.search);
        const rv = {
            owner:    params.get('owner') || '',
            repo:     params.get('repo')  || '',
            provider: params.get('provider') || 'gh',
            path:     [],
        };

        if (!rv.owner || !rv.repo) {
            document.body.innerHTML = '<div style="padding:2rem;font-family:monospace;color:#d16014;">Error: missing owner/repo parameters in the URL.</div>';
        } else {
            init();
        }

        function init() {
            document.title = `${rv.owner}/${rv.repo} · gitGost`;
            document.getElementById('statusbar-path').innerHTML =
                `<a href="/?q=${encodeURIComponent(rv.owner)}" style="color:var(--fg-muted);text-decoration:none;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--fg-muted)'">${escHtml(rv.owner)}</a>`+
                `<span style="color:var(--fg-muted);">/</span>`+
                `<a href="#" onclick="showView('home');return false;" style="color:var(--fg-muted);text-decoration:none;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--fg-muted)'">${escHtml(rv.repo)}</a>`;

            // fork link
            const forkLink = document.getElementById('fork-link');
            if (forkLink) {
                forkLink.href = rv.provider === 'gh'
                    ? `https://github.com/${rv.owner}/${rv.repo}/fork`
                    : `https://gitlab.com/${rv.owner}/${rv.repo}/-/forks/new`;
            }

            // sidebar settings link
            const sbSettings = document.getElementById('sb-settings');
            if (sbSettings) sbSettings.href = rv.provider === 'gh'
                ? `https://github.com/${rv.owner}/${rv.repo}/settings`
                : `https://gitlab.com/${rv.owner}/${rv.repo}/edit`;

            const sbStarBtn = document.getElementById('sb-star-btn');
            if (sbStarBtn) sbStarBtn.disabled = false;

            // load repo info
            loadRepoInfo();
            loadLanguages();
            _updateStarBtn();
            // show home view by default (README)
            showView('home');
        }

        function showView(view) {
            const navLinks = document.querySelectorAll('.left-nav a');
            navLinks.forEach(a => a.classList.remove('active'));
            const idx = ['home','files','commits','bugs','reviews'].indexOf(view); // bugs=issues, reviews=pull requests
            if (idx >= 0 && navLinks[idx]) navLinks[idx].classList.add('active');

            const fileTree = document.getElementById('file-tree');
            const codePanel = document.getElementById('code-panel');

            if (view === 'home') {
                fileTree.style.display = 'none';
                codePanel.innerHTML = '<div class="code-loading">loading README...</div>';
                loadReadme();
            } else if (view === 'files') {
                fileTree.style.display = '';
                loadDir([]);
            } else if (view === 'bugs') {
                fileTree.style.display = 'none';
                loadIssues();
            } else if (view === 'reviews') {
                fileTree.style.display = 'none';
                loadPRs();
            } else {
                fileTree.style.display = 'none';
                codePanel.innerHTML = `<div class="code-loading" style="color:var(--fg-secondary)">/${view} — coming soon</div>`;
            }
        }

        async function loadReadme() {
            const panel = document.getElementById('code-panel');
            try {
                let item = null;
                if (rv.provider === 'gh') {
                    const res = await ghFetch(`https://api.github.com/repos/${rv.owner}/${rv.repo}/contents/`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const items = await res.json();
                    item = items.find(i => i.name.toLowerCase() === 'readme.md');
                } else {
                    const enc = encodeURIComponent(`${rv.owner}/${rv.repo}`);
                    const res = await fetch(`https://gitlab.com/api/v4/projects/${enc}/repository/files/README.md/raw?ref=HEAD`);
                    if (res.ok) {
                        let text = await res.text();
                        // Limpieza muy agresiva de cualquier patrón que cause undefined
                        text = text.replace(/\$\{[^}]+\}/g, ''); // ${variable}
                        text = text.replace(/\$\[.*?\]/g, ''); // $[variable]
                        text = text.replace(/undefined/g, 'GitLab'); // undefined -> GitLab
                        text = text.replace(/\[undefined\]/g, ''); // [undefined]
                        text = text.replace(/is undefined/g, 'is hosted on GitLab.com'); // Frase específica
                        text = text.replace(/located at undefined/g, 'located at https://gitlab.com/gitlab-org/gitlab-foss/'); // Frase específica
                        // Eliminar cualquier línea que contenga undefined
                        text = text.split('\n').filter(line => !line.includes('undefined')).join('\n');
                        panel.innerHTML = `<div class="readme">${renderMd(text)}</div>`;
                        panel.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
                        return;
                    }
                }
                if (item) {
                    await loadFile(item);
                } else {
                    panel.innerHTML = '<div class="code-loading">no README</div>';
                }
            } catch(e) {
                panel.innerHTML = `<div class="code-loading" style="color:var(--accent)">error: ${e.message}</div>`;
            }
        }

        let _bugsCache = { open: null, closed: null };

        async function loadIssues() {
            const panel = document.getElementById('code-panel');
            _bugsCache = { open: null, closed: null };
            panel.innerHTML = '<div class="code-loading">loading issues...</div>';
            try {
                let open = [], closed = [];
                if (rv.provider === 'gh') {
                    const [rOpen, rClosed] = await Promise.all([
                        ghFetch(`https://api.github.com/repos/${rv.owner}/${rv.repo}/issues?state=open&per_page=50`),
                        ghFetch(`https://api.github.com/repos/${rv.owner}/${rv.repo}/issues?state=closed&per_page=50`)
                    ]);
                    if (rOpen.ok) { const d = await rOpen.json(); open = d.filter(i => !i.pull_request); }
                    if (rClosed.ok) { const d = await rClosed.json(); closed = d.filter(i => !i.pull_request); }
                } else {
                    const enc = encodeURIComponent(`${rv.owner}/${rv.repo}`);
                    const [rOpen, rClosed] = await Promise.all([
                        fetch(`https://gitlab.com/api/v4/projects/${enc}/issues?state=opened&per_page=50`),
                        fetch(`https://gitlab.com/api/v4/projects/${enc}/issues?state=closed&per_page=50`)
                    ]);
                    if (rOpen.ok) open = await rOpen.json();
                    if (rClosed.ok) closed = await rClosed.json();
                }
                _bugsCache.open = open;
                _bugsCache.closed = closed;
                renderBugsView('open');
            } catch(e) {
                panel.innerHTML = `<div class="code-loading" style="color:var(--accent)">error: ${e.message}</div>`;
            }
        }

        function renderBugsView(tab) {
            _currentBugsTab = tab;
            const panel = document.getElementById('code-panel');
            const open   = _bugsCache.open   || [];
            const closed = _bugsCache.closed || [];
            // "pending" = open issues with no assignee
            const pending = open.filter(i => !(i.assignees?.length || i.assignee));
            const items = tab === 'open' ? open : tab === 'pending' ? pending : closed;

            const toolbar = `
                <div class="bugs-toolbar">
                    <button class="bugs-tab ${tab==='open'?'active':''}" onclick="renderBugsView('open')">Open <span style="opacity:.6;">${open.length}</span></button>
                    <button class="bugs-tab ${tab==='pending'?'active':''}" onclick="renderBugsView('pending')">Pending <span style="opacity:.6;">${pending.length}</span></button>
                    <button class="bugs-tab ${tab==='closed'?'active':''}" onclick="renderBugsView('closed')">Closed <span style="opacity:.6;">${closed.length}</span></button>
                    <span class="bugs-spacer"></span>
                    <button class="bugs-new-btn" onclick="openBugModal()">+ new issue</button>
                </div>`;

            if (!items.length) {
                panel.innerHTML = toolbar + `<div class="bugs-empty">no ${tab} issues</div>`;
                return;
            }

            const list = items.map(i => {
                const labels = (i.labels || []).map(l => {
                    const color = l.color ? `#${l.color}` : 'var(--border)';
                    return `<span class="issue-label" style="background:${color}22;border:1px solid ${color};color:${color};">${escHtml(l.name)}</span>`;
                }).join('');
                const user = i.user?.login || i.author?.username || '';
                const date = new Date(i.created_at).toLocaleDateString('en', {month:'short', day:'numeric', year:'numeric'});
                const url  = i.html_url || i.web_url || '#';
                const assignee = i.assignees?.[0]?.login || i.assignee?.login || i.assignee?.username || '';
                const num = i.number || i.iid;
                return `<div class="issue-item" style="cursor:pointer;" onclick="showIssueDetail(${num})">
                    <span class="issue-num">#${num}</span>
                    <span class="issue-title">${escHtml(i.title)}${labels}</span>
                    <span class="issue-meta">${assignee ? assignee + ' · ' : ''}${user} · ${date}</span>
                </div>`;
            }).join('');

            panel.innerHTML = toolbar + `<div class="issue-list">${list}</div>`;
        }

            const url     = issue.html_url || issue.web_url || '#';
            const state   = issue.state || 'open';
            const body    = issue.body || issue.description || '';

                        ${labels ? `<div style="margin-bottom:0.75rem;display:flex;gap:0.3rem;flex-wrap:wrap;">${labels}</div>` : ''}
                        <div class="issue-detail-meta">

                        <ul class="comment-list" id="${listId}"></ul>

                            <div class="reply-row">
                                <div class="reply-avatar"><img src="assets/logos/noun-anonymous-6758229.svg" width="16" height="16" style="display:block;" /></div>

                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>

                                    </div>

                    <div class="issue-detail-sidebar">
                        <div>
                            <div class="ds-label">status</div>
                            <div class="ds-val">${escHtml(state)}</div>

                        <div>
                            <div class="ds-label">created</div>
                            <div class="ds-val">${created}</div>
                        </div>
                        <div>
                            <div class="ds-label">updated</div>
                            <div class="ds-val">${updated}</div>

                        ${issue.assignees?.length || issue.assignee ? `<div>

        async function loadIssueComments(num, listId) {
            const list = document.getElementById(listId);
            if (!list) return;
            list.innerHTML = '<li style="list-style:none;font-family:\'IBM Plex Mono\',monospace;font-size:0.7rem;color:var(--fg-muted);padding:0.5rem 0;">loading comments...</li>';
            try {
                let comments = [];
                if (rv.provider === 'gh') {
                    const res = await ghFetch(`https://api.github.com/repos/${rv.owner}/${rv.repo}/issues/${num}/comments?per_page=100`);
                    if (res.ok) comments = await res.json();
                } else {
                    const res = await fetch(`/api/gl-notes/${encodeURIComponent(rv.owner)}/${encodeURIComponent(rv.repo)}/${num}`);
                    if (res.ok) comments = await res.json();
                }
                list.innerHTML = '';
                if (!comments.length) return;
                for (const c of comments) {
                    const cUser   = c.user?.login || c.author?.username || c.author?.name || 'anonymous';
                    const cAvatar = c.user?.avatar_url || c.author?.avatar_url || '';
                    const cDate   = new Date(c.created_at).toLocaleDateString('en', {year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                    const cBody   = c.body || '';
                    const li = document.createElement('li');
                    li.className = 'comment-item';
                    li.innerHTML = `
                        ${cAvatar
                            ? `<img src="${cAvatar}" style="width:26px;height:26px;border-radius:50%;flex-shrink:0;border:1px solid var(--border);" />`
                            : `<div class="reply-avatar"><img src="assets/logos/noun-anonymous-6758229.svg" width="16" height="16" style="display:block;" /></div>`}
                        <div class="comment-bubble">
                            <div class="comment-meta"><strong style="color:var(--fg);">${escHtml(cUser)}</strong> &middot; ${cDate}</div>
                            <div class="readme" style="font-size:0.8rem;">${renderMd(cBody)}</div>
                        </div>`;
                    list.appendChild(li);
                }
                list.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
            } catch(e) {
                if (list) list.innerHTML = `<li style="list-style:none;font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--accent);">error loading comments: ${e.message}</li>`;
            }
        }

        let _currentBugsTab = 'open';

        function openBugModal() {
            if (document.getElementById('bug-modal-overlay')) return;
            const overlay = document.createElement('div');
            overlay.id = 'bug-modal-overlay';
            overlay.className = 'bug-modal-overlay';
            overlay.innerHTML = `
                <div class="bug-modal">
                    <div>
                        <div class="bug-modal-title"># Title</div>
                        <input id="bug-title-input" type="text" placeholder="Summarize the issue in one line" />
                    </div>
                    <div>
                        <div class="bug-modal-title"># Description</div>
                        <textarea id="bug-desc-input" placeholder="What happened, what you expected, steps to reproduce..."></textarea>
                    </div>
                    <div>
                        <div class="bug-modal-title"># Labels (optional, comma-separated)</div>
                        <input id="bug-labels-input" type="text" placeholder="bug, enhancement, help wanted" />
                    </div>
                    <div class="bug-modal-footer">
                        <span class="note">Anonymous issue in <a href="https://github.com/${rv.owner}/${rv.repo}" target="_blank">${rv.owner}/${rv.repo}</a></span>

                            <span id="bug-status" style="font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--fg-muted);"></span>

        function closeBugModal() {
            const el = document.getElementById('bug-modal-overlay');
            if (el) el.remove();
        }

        async function submitBug() {
            const title = document.getElementById('bug-title-input')?.value.trim();
            const body  = document.getElementById('bug-desc-input')?.value.trim();
            const labelsRaw = document.getElementById('bug-labels-input')?.value.trim();
            if (!title) { document.getElementById('bug-title-input').focus(); return; }
            if (!body)  { document.getElementById('bug-desc-input').focus(); return; }
            const btn = document.getElementById('bug-submit-btn');
            const statusEl = document.getElementById('bug-status');
            const labels = labelsRaw ? labelsRaw.split(',').map(l => l.trim()).filter(Boolean) : [];
            if (btn) btn.disabled = true;
            if (statusEl) statusEl.textContent = 'Sending...';
            try {
                const res = await fetch(`/v1/${rv.provider}/${encodeURIComponent(rv.owner)}/${encodeURIComponent(rv.repo)}/issues/anonymous`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Gitgost-Key': 'gitgost-anonymous' },
                    body: JSON.stringify({ title, body, labels }),
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (statusEl) statusEl.textContent = 'Created';
                closeBugModal();
                if (data.issue_url) {
                    const parts = [`Issue: ${data.issue_url}`];
                    if (data.hash) parts.push(`Hash: ${data.hash}`);
                    if (data.user_token) parts.push(`Token: ${data.user_token}`);
                    alert(parts.join('\n'));
                }
                loadIssues();
            } catch(e) {
                if (statusEl) statusEl.textContent = `Error: ${e.message}`;
                if (btn) btn.disabled = false;
            }
        }

        let _prsCache = null;

        async function loadPRs() {
            const panel = document.getElementById('code-panel');
            _prsCache = null;
            panel.innerHTML = '<div class="code-loading">loading pull requests...</div>';
            try {
                let open = [], closed = [];
                if (rv.provider === 'gh') {
                    const [rOpen, rClosed] = await Promise.all([
                        ghFetch(`https://api.github.com/repos/${rv.owner}/${rv.repo}/pulls?state=open&per_page=50`),
                        ghFetch(`https://api.github.com/repos/${rv.owner}/${rv.repo}/pulls?state=closed&per_page=50`)
                    ]);
                    if (rOpen.ok)   open   = await rOpen.json();
                    if (rClosed.ok) closed = await rClosed.json();
                } else {
                    const enc = encodeURIComponent(`${rv.owner}/${rv.repo}`);
                    const [rOpen, rClosed] = await Promise.all([
                        fetch(`https://gitlab.com/api/v4/projects/${enc}/merge_requests?state=opened&per_page=50`),
                        fetch(`https://gitlab.com/api/v4/projects/${enc}/merge_requests?state=closed&per_page=50`)
                    ]);
                    if (rOpen.ok)   open   = await rOpen.json();
                    if (rClosed.ok) closed = await rClosed.json();
                }
                _prsCache = { open, closed };
                renderPRsView('all');
            } catch(e) {
                panel.innerHTML = `<div class="code-loading" style="color:var(--accent)">error: ${e.message}</div>`;
            }
        }

        function renderPRsView(tab) {
            _currentPRsTab = tab;
            const panel = document.getElementById('code-panel');
            if (!_prsCache) return;
            const { open, closed } = _prsCache;
            const draft  = open.filter(i => i.draft);
            const active = open.filter(i => !i.draft);
            const all    = [...open, ...closed];
            const items  = tab === 'all' ? all : tab === 'draft' ? draft : tab === 'open' ? active : closed;

            const toolbar = `
                <div class="bugs-toolbar">
                    <button class="bugs-tab ${tab==='all'?'active':''}"    onclick="renderPRsView('all')">all <span style="opacity:.6;">${all.length}</span></button>
                    <button class="bugs-tab ${tab==='draft'?'active':''}"  onclick="renderPRsView('draft')">draft <span style="opacity:.6;">${draft.length}</span></button>
                    <button class="bugs-tab ${tab==='open'?'active':''}"   onclick="renderPRsView('open')">open <span style="opacity:.6;">${active.length}</span></button>
                    <button class="bugs-tab ${tab==='closed'?'active':''}" onclick="renderPRsView('closed')">closed <span style="opacity:.6;">${closed.length}</span></button>
                </div>`;

            if (!items.length) {
                panel.innerHTML = toolbar + `<div class="bugs-empty">no ${tab} pull requests</div>`;
                return;
            }

            const list = items.map(i => {
                const user   = i.user?.login || i.author?.username || '';
                const date   = new Date(i.created_at).toLocaleDateString('en', {month:'short', day:'numeric', year:'numeric'});
                const url    = i.html_url || i.web_url || '#';
                const base   = i.base?.ref || i.target_branch || '';
                const head   = i.head?.ref || i.source_branch || '';
                const merged = !!(i.merged_at || i.merged);
                const isDraft = !!(i.draft);

                let stateBadge = '';
                if (merged)       stateBadge = `<span class="issue-label" style="background:#8957e522;border:1px solid #8957e5;color:#8957e5;">merged</span>`;
                else if (isDraft) stateBadge = `<span class="issue-label" style="background:var(--bg-secondary);border:1px solid var(--border);color:var(--fg-muted);">draft</span>`;
                else if (i.state === 'closed' || i.state === 'merged') stateBadge = `<span class="issue-label" style="background:#da373722;border:1px solid #da3737;color:#da3737;">closed</span>`;

                const branchInfo = (head && base)
                    ? `<span class="issue-label" style="background:var(--bg-secondary);border:1px solid var(--border);color:var(--fg-muted);font-size:0.62rem;">${escHtml(head)} → ${escHtml(base)}</span>`
                    : '';

                const reviewState = i.review_comments > 0
                    ? `<span style="font-size:0.68rem;color:var(--fg-muted);font-family:'IBM Plex Mono',monospace;flex-shrink:0;">💬 ${i.review_comments}</span>`
                    : '';

                const num = i.number || i.iid;
                return `<div class="issue-item" style="align-items:flex-start;padding:0.6rem 0;cursor:pointer;" onclick="showPRDetail(${num})">
                    <span class="issue-num">#${num}</span>
                    <span class="issue-title" style="display:flex;flex-direction:column;gap:0.25rem;">
                        <span>${escHtml(i.title)}${stateBadge}</span>
                        <span style="display:flex;gap:0.3rem;flex-wrap:wrap;">${branchInfo}</span>
                    </span>
                    <span class="issue-meta" style="display:flex;flex-direction:column;align-items:flex-end;gap:0.2rem;flex-shrink:0;">
                        ${reviewState}
                        <span>${user} · ${date}</span>
                    </span>
                </div>`;
            }).join('');

            panel.innerHTML = toolbar + `<div class="issue-list">${list}</div>`;
        }

        async function submitIssueComment(provider, owner, repo, number, replyId, tokenId, statusId, listId) {
            const textarea = document.getElementById(replyId);
            const tokenEl  = document.getElementById(tokenId);
            const statusEl = document.getElementById(statusId);
            const body = textarea?.value.trim();
            if (!body) { if (statusEl) statusEl.textContent = 'write something first'; return; }
            const btn = textarea?.closest('.reply-box')?.querySelector('.reply-send-btn');
            if (btn) btn.disabled = true;
            if (statusEl) statusEl.textContent = 'sending...';
            const savedToken = localStorage.getItem('comment_token') || '';
            const payload = { body };
            const manualToken = tokenEl?.value.trim();
            const useToken = manualToken || savedToken;
            if (useToken) payload.user_token = useToken;
            try {
                const res = await fetch(`/v1/${provider}/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/issues/${number}/comments/anonymous`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Gitgost-Key': 'gitgost-anonymous' },
                    body: JSON.stringify(payload),
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const commentBody = body;
                if (textarea) textarea.value = '';
                if (statusEl) statusEl.textContent = 'sent';

                // Mostrar comentario inline
                const list = document.getElementById(listId);
                if (list) {
                    const li = document.createElement('li');
                    li.className = 'comment-item';
                    li.innerHTML = `
                        <div class="reply-avatar"><img src="assets/logos/noun-anonymous-6758229.svg" width="16" height="16" style="display:block;" /></div>
                        <div class="comment-bubble">
                            <div class="comment-meta">you &middot; just now${data.hash ? ` &middot; <span style="color:var(--accent)">${data.hash}</span>` : ''}</div>
                            <div>${escHtml(commentBody).replace(/\n/g, '<br>')}</div>
                        </div>`;
                    list.appendChild(li);
                    li.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }

                // Modal para guardar hash
                if (data.hash && !localStorage.getItem('comment_token')) {
                    showHashSaveModal(data.hash, data.user_token);
                }
            } catch(e) {
                if (statusEl) statusEl.textContent = 'error: ' + e.message;
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        function showHashSaveModal(hash, userToken) {
            const existing = document.getElementById('hash-modal-overlay');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.id = 'hash-modal-overlay';
            overlay.className = 'hash-modal-overlay';
            overlay.innerHTML = `
                <div class="hash-modal">
                    <div class="hash-modal-title">save your identity?</div>
                    <div class="hash-modal-body">Your comment was sent anonymously. Save this hash to identify your future comments and maintain karma across sessions.</div>
                    <div class="hash-modal-code">${escHtml(hash)}</div>
                    <div class="hash-modal-actions">
                        <button class="hash-modal-btn" onclick="document.getElementById('hash-modal-overlay').remove()">dismiss</button>
                        <button class="hash-modal-btn primary" onclick="saveCommentToken('${escHtml(hash)}','${escHtml(userToken||hash)}')">save hash</button>
                    </div>
                </div>`;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        }

        function saveCommentToken(hash, userToken) {
            localStorage.setItem('comment_token', userToken || hash);
            const overlay = document.getElementById('hash-modal-overlay');
            if (overlay) {
                overlay.querySelector('.hash-modal-body').textContent = 'Saved! Your identity will be used automatically in future comments.';
                overlay.querySelector('.hash-modal-code').style.display = 'none';
                overlay.querySelector('.hash-modal-actions').innerHTML = '<button class="hash-modal-btn primary" onclick="document.getElementById(\'hash-modal-overlay\').remove()">done</button>';
            }
        }

        let _currentPRsTab = 'all';

        function showPRDetail(num) {
            const all = [...(_prsCache?.open||[]), ...(_prsCache?.closed||[])];
            const pr = all.find(i => (i.number || i.iid) === num);
            if (!pr) return;

            const panel = document.getElementById('code-panel');
            const user    = pr.user?.login || pr.author?.username || '';
            const avatar  = pr.user?.avatar_url || pr.author?.avatar_url || '';
            const created = new Date(pr.created_at).toLocaleDateString('en', {year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
            const updated = new Date(pr.updated_at).toLocaleDateString('en', {year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
            const url     = pr.html_url || pr.web_url || '#';
            const state   = pr.merged_at ? 'merged' : (pr.merged ? 'merged' : pr.state || 'open');
            const body    = pr.body || pr.description || '';
            const base    = pr.base?.ref || pr.target_branch || '';

                            <span>opened ${created}</span>
                            <span style="margin-left:auto;"><a class="issue-ext-link" href="${url}" target="_blank" rel="noopener">${rv.owner}/${rv.repo}#${num} ↗</a></span>
                        </div>
                        <div class="issue-detail-body readme">${renderedBody}</div>
                        <div class="reply-section">
                            <div class="reply-row">
                                <div class="reply-avatar"><img src="assets/logos/noun-anonymous-6758229.svg" width="16" height="16" style="display:block;" /></div>

                                        <span class="reply-status" id="${statusId}"></span>
                                        <button class="reply-send-btn" onclick="submitIssueComment('${rv.provider}','${rv.owner}','${rv.repo}',${num},'${replyId}','${tokenId}','${statusId}')" title="Send">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                        </button>

                    <div class="issue-detail-sidebar">

                    if (infoDesc && d.description) infoDesc.textContent = d.description;

        async function loadLanguages() {
            try {
                let entries = [];
                if (rv.provider === 'gh') {
                    const res = await ghFetch(`https://api.github.com/repos/${rv.owner}/${rv.repo}/languages`);
                    if (!res.ok) return;
                    const data = await res.json();
                    entries = Object.entries(data);
                } else if (rv.provider === 'gl') {
                    const enc = encodeURIComponent(`${rv.owner}/${rv.repo}`);
                    const res = await fetch(`https://gitlab.com/api/v4/projects/${enc}`);
                    if (!res.ok) return;
                    const project = await res.json();
                    if (!project.id) return;
                    const langRes = await fetch(`https://gitlab.com/api/v4/projects/${project.id}/languages`);
                    if (!langRes.ok) return;
                    const data = await langRes.json();
                    entries = Object.entries(data);
                } else {
                    return;
                }
                if (!entries.length) return;

                const total = entries.reduce((s, [, v]) => s + v, 0);
                const colors = [
                    '#3572A5','#f1e05a','#e34c26','#b07219','#89e051',
                    '#4F5D95','#2b7489','#563d7c','#A97BFF','#00ADD8',
                    '#dea584','#701516','#c397d8','#6e4c13','#3d6117',
                ];

                const bar   = document.getElementById('sb-lang-bar');
                const legend= document.getElementById('sb-lang-legend');
                const section = document.getElementById('sb-langs-section');
                if (!bar || !legend || !section) return;

                bar.innerHTML = '';
                legend.innerHTML = '';

                entries.forEach(([lang, value], i) => {
                    const pct = rv.provider === 'gh' ? (value / total * 100).toFixed(1) : value.toFixed(1);
                    const color = colors[i % colors.length];
                    const seg = document.createElement('div');
                    seg.className = 'lang-bar-seg';
                    seg.style.cssText = `width:${pct}%;background:${color};`;
                    seg.title = `${lang} ${pct}%`;
                    bar.appendChild(seg);

                    const item = document.createElement('div');
                    item.className = 'lang-legend-item';
                    item.innerHTML = `<span class="lang-dot" style="background:${color}"></span><span class="lang-name">${lang}</span><span>${pct}%</span>`;
                    legend.appendChild(item);
                });

                section.style.display = '';
            } catch {}
        }

        const ICON_FILE          = `<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.688 3.063a3.5 3.5 0 0 1 1.027.712l5.968 5.97c.3.3.54.647.711 1.026m-7.706-7.708a3.5 3.5 0 0 0-1.448-.313H7.792a3.5 3.5 0 0 0-3.5 3.5v11.5a3.5 3.5 0 0 0 3.5 3.5h8.416a3.5 3.5 0 0 0 3.5-3.5v-5.53c0-.505-.109-.999-.314-1.45m-7.706-7.707V8.77a2 2 0 0 0 2 2h5.706"/></svg>`;
